name: Nightly Tests

on:
  schedule:
    # Run every night at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-nightly:
    name: Test on Nightly Rust
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail if nightly has issues
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt, clippy, miri

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting (nightly)
      run: cargo +nightly fmt --all -- --check

    - name: Run clippy (nightly)
      run: cargo +nightly clippy --all-targets --all-features -- -D warnings

    - name: Build with nightly
      run: cargo +nightly build --all-features

    - name: Run tests with nightly
      run: cargo +nightly test --all-features

    - name: Run Miri tests (unsafe code verification)
      run: |
        cargo +nightly miri setup
        cargo +nightly miri test --lib
      env:
        MIRIFLAGS: -Zmiri-disable-isolation

  test-future-compatibility:
    name: Future Compatibility Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly

    - name: Check future incompatibilities
      run: cargo +nightly check --future-incompat-report

  test-minimal-versions:
    name: Test Minimal Versions
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly

    - name: Install cargo-hack
      run: cargo install cargo-hack

    - name: Check minimal versions
      run: cargo +nightly hack check --all --all-features --version-range 1.70.0..

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Run benchmarks
      run: cargo bench --all-features || echo "No benchmarks defined yet"

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: target/criterion/

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-nightly, test-future-compatibility, test-minimal-versions]
    if: failure()
    steps:
    - name: Create issue on failure
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Nightly tests failing',
            body: `The nightly tests are failing. Please check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
            labels: ['bug', 'nightly', 'automated']
          })